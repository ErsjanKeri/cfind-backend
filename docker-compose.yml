version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: companyfinder_db
    environment:
      POSTGRES_USER: companyfinder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-companyfinder_dev_password}
      POSTGRES_DB: companyfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyfinder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - companyfinder_network

  # FastAPI Backend
  api:
    build: .
    container_name: companyfinder_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # App
      APP_NAME: CompanyFinder Albania API
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_PREFIX: /api
      ENVIRONMENT: ${ENVIRONMENT:-development}

      # Database - Use .env file DATABASE_URL (DigitalOcean PostgreSQL)
      DATABASE_URL: ${DATABASE_URL}

      # JWT
      JWT_PRIVATE_KEY_PATH: keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: keys/jwt_public.pem
      JWT_ALGORITHM: RS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      REFRESH_TOKEN_EXPIRE_DAYS_REMEMBER: 30

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

      # Email - ZeptoMail SMTP (from .env)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}

      # AWS S3 / DigitalOcean Spaces
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      AWS_ENDPOINT: ${AWS_ENDPOINT}

      # Cron
      CRON_SECRET: ${CRON_SECRET}

    # No dependency on local db - we use DigitalOcean PostgreSQL
    # depends_on:
    #   db:
    #     condition: service_healthy
    volumes:
      - .:/app  # Mount current directory for development hot-reload
      - ./keys:/app/keys  # Persist JWT keys
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - companyfinder_network

volumes:
  postgres_data:
    driver: local

networks:
  companyfinder_network:
    driver: bridge
