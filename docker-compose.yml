# Local development database.
#
# Usage:
#   docker compose up -d          Start Postgres on localhost:5432
#   docker compose down           Stop (data persists in volume)
#   docker compose down -v        Stop and wipe all data
#
# After starting, run migrations:
#   alembic upgrade head

services:
  db:
    image: postgres:15-alpine
    container_name: companyfinder_db
    environment:
      POSTGRES_USER: companyfinder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-companyfinder_dev_password}
      POSTGRES_DB: companyfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
